{{- if .Values.gatewayApi.enabled -}}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HTTPRoute
metadata:
  name: {{ include "social-media-reuploader.fullname" . }}-httproute
  labels:
{{ include "social-media-reuploader.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.gatewayName }}
  hostnames:
{{- range .Values.gatewayApi.hosts }}
    - {{ . }}
{{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.gatewayApi.path | quote }}
      backendRefs:
        - backendRef:
            name: {{ include "social-media-reuploader.fullname" . }}
            port: {{ .Values.gatewayApi.servicePort | default 80 }}
{{- end -}}
