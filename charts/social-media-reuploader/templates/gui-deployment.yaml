{{- if .Values.gui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "social-media-reuploader.fullname" . }}-gui
  labels:
{{ include "social-media-reuploader.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: gui
  template:
    metadata:
      labels:
{{ include "social-media-reuploader.labels" . | nindent 8 }}
        app.kubernetes.io/component: gui
    spec:
      serviceAccountName: '{{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else if .Values.serviceAccount.create }}{{ include "social-media-reuploader.fullname" . }}-sa{{ else }}{{ "" }}{{ end }}'
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      containers:
        - name: social-media-reuploader-gui
          image: "{{ .Values.gui.image.repository }}:{{ default .Chart.AppVersion .Values.gui.image.tag }}"
          imagePullPolicy: {{ .Values.gui.image.pullPolicy }}
          {{- if .Values.gui.command }}
          command:
{{ toYaml .Values.gui.command | indent 12 }}
          {{- end }}
          {{- if .Values.gui.args }}
          args:
{{ toYaml .Values.gui.args | indent 12 }}
          {{- end }}
          ports:
            - containerPort: {{ .Values.gui.port | default 8081 }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gui.port | default 8081 }}
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.gui.port | default 8081 }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
{{- $hasSecrets := or .Values.gui.secrets.adminToken .Values.gui.secrets.secretKey .Values.gui.secrets.oauthClientId .Values.gui.secrets.oauthClientSecret .Values.gui.secrets.oauthAuthorizeUrl .Values.gui.secrets.oauthTokenUrl .Values.gui.secrets.oauthUserinfoUrl -}}
{{- if .Values.gui.useSecret }}
          envFrom:
            - secretRef:
                name: {{ if .Values.gui.secretName }}{{ .Values.gui.secretName }}{{ else }}{{ include "social-media-reuploader.fullname" . }}-gui-secret{{ end }}
          env:
            {{- /* REQUESTS_DB and runtime defaults when using a secret */}}
            {{- if .Values.db.pvc.enabled }}
            - name: REQUESTS_DB
              value: '{{ .Values.db.pvc.mountPath | default "/app/data" }}/requests.db'
            {{- else if .Values.env.REQUESTS_DB }}
            - name: REQUESTS_DB
              value: '{{ .Values.env.REQUESTS_DB }}'
            {{- else }}
            - name: REQUESTS_DB
              value: '/app/data/requests.db'
            {{- end }}
            - name: MODE
              value: '{{ .Values.env.MODE | default "webhook" }}'
            - name: TMP_DIR
              value: '{{ .Values.env.TMP_DIR | default "/tmp/telegram_downloader" }}'
            - name: TELEGRAM_MAX_FILE_SIZE
              value: '{{ .Values.env.TELEGRAM_MAX_FILE_SIZE | default 52428800 }}'
            - name: WORKERS
              value: '{{ .Values.env.WORKERS | default "2" }}'
            - name: HEALTH_DEBUG
              value: '{{ .Values.env.HEALTH_DEBUG | default "false" }}'
            - name: YTDLP_USER_AGENT
              value: '{{ .Values.env.YTDLP_USER_AGENT | default "" }}'
            - name: YTDLP_COOKIES_PATH
              value: '{{ .Values.env.YTDLP_COOKIES_PATH | default "" }}'
            - name: YTDLP_COOKIES_FROM_BROWSER
              value: '{{ .Values.env.YTDLP_COOKIES_FROM_BROWSER | default "" }}'
            - name: YTDLP_HEADERS
              value: '{{ .Values.env.YTDLP_HEADERS | default "" }}'
{{- else if $hasSecrets }}
          env:
            {{- if .Values.gui.secrets.adminToken }}
            - name: ADMIN_TOKEN
              value: "{{ .Values.gui.secrets.adminToken }}"
            {{- end }}
            {{- if .Values.gui.secrets.secretKey }}
            - name: SECRET_KEY
              value: "{{ .Values.gui.secrets.secretKey }}"
            {{- end }}
            {{- if .Values.gui.secrets.oauthClientId }}
            - name: OAUTH_CLIENT_ID
              value: "{{ .Values.gui.secrets.oauthClientId }}"
            {{- end }}
            {{- if .Values.gui.secrets.oauthClientSecret }}
            - name: OAUTH_CLIENT_SECRET
              value: "{{ .Values.gui.secrets.oauthClientSecret }}"
            {{- end }}
            {{- if .Values.gui.secrets.oauthAuthorizeUrl }}
            - name: OAUTH_AUTHORIZE_URL
              value: "{{ .Values.gui.secrets.oauthAuthorizeUrl }}"
            {{- end }}
            {{- if .Values.gui.secrets.oauthTokenUrl }}
            - name: OAUTH_TOKEN_URL
              value: "{{ .Values.gui.secrets.oauthTokenUrl }}"
            {{- end }}
            {{- if .Values.gui.secrets.oauthUserinfoUrl }}
            - name: OAUTH_USERINFO_URL
              value: "{{ .Values.gui.secrets.oauthUserinfoUrl }}"
            {{- end }}
            {{- /* append REQUESTS_DB and runtime defaults */}}
            {{- if .Values.db.pvc.enabled }}
            - name: REQUESTS_DB
              value: '{{ .Values.db.pvc.mountPath | default "/app/data" }}/requests.db'
            {{- else if .Values.env.REQUESTS_DB }}
            - name: REQUESTS_DB
              value: '{{ .Values.env.REQUESTS_DB }}'
            {{- else }}
            - name: REQUESTS_DB
              value: '/app/data/requests.db'
            {{- end }}
            - name: MODE
              value: '{{ .Values.env.MODE | default "webhook" }}'
            - name: TMP_DIR
              value: '{{ .Values.env.TMP_DIR | default "/tmp/telegram_downloader" }}'
            - name: TELEGRAM_MAX_FILE_SIZE
              value: '{{ .Values.env.TELEGRAM_MAX_FILE_SIZE | default 52428800 }}'
            - name: WORKERS
              value: '{{ .Values.env.WORKERS | default "2" }}'
            - name: HEALTH_DEBUG
              value: '{{ .Values.env.HEALTH_DEBUG | default "false" }}'
            - name: YTDLP_USER_AGENT
              value: '{{ .Values.env.YTDLP_USER_AGENT | default "" }}'
            - name: YTDLP_COOKIES_PATH
              value: '{{ .Values.env.YTDLP_COOKIES_PATH | default "" }}'
            - name: YTDLP_COOKIES_FROM_BROWSER
              value: '{{ .Values.env.YTDLP_COOKIES_FROM_BROWSER | default "" }}'
            - name: YTDLP_HEADERS
              value: '{{ .Values.env.YTDLP_HEADERS | default "" }}'
{{- end }}
          resources:
{{ toYaml .Values.guiResources | indent 12 }}
          {{- if .Values.db.pvc.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.db.pvc.mountPath | default "/app/data" }}
          {{- end }}
      {{- if .Values.db.pvc.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "social-media-reuploader.fullname" . }}-data
      {{- end }}
{{- end -}}
