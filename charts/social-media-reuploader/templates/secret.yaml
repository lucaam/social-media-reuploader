{{- if .Values.secret.create -}}
{{- if not .Values.env.BOT_TOKEN }}
{{- fail "secret.create is true but env.BOT_TOKEN is empty; pass token via --set env.BOT_TOKEN, or set secret.create=false and configure secret.name to use an existing Secret" }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{- if .Values.secret.name }}{{ .Values.secret.name }}{{- else }}{{ include "social-media-reuploader.fullname" . }}-secret{{- end }}
  labels:
{{ include "social-media-reuploader.labels" . | nindent 4 }}
type: Opaque
data:
  {{ default "BOT_TOKEN" .Values.secret.botTokenKey }}: {{ .Values.env.BOT_TOKEN | b64enc | quote }}
{{- end }}
