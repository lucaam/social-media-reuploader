apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "social-media-reuploader.fullname" . | default "social-media-reuploader" }}
  labels:
{{ include "social-media-reuploader.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: bot
  template:
    metadata:
      labels:
{{ include "social-media-reuploader.labels" . | nindent 8 }}
        app.kubernetes.io/component: bot
    spec:
      serviceAccountName: '{{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else if .Values.serviceAccount.create }}{{ include "social-media-reuploader.fullname" . }}-sa{{ else }}{{ "" }}{{ end }}'
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      {{- if not (hasKey .Values.resourceProfiles .Values.resourceProfile) }}
      {{- fail (printf "unknown resourceProfile: %s" .Values.resourceProfile) }}
      {{- end }}
      {{- $profile := index .Values.resourceProfiles .Values.resourceProfile }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default $profile.terminationGracePeriodSeconds }}
      containers:
        - name: social-media-reuploader
          image: "{{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          env:
{{- if or .Values.secret.create .Values.secret.name }}
            - name: BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secret.name }}{{ .Values.secret.name }}{{ else }}{{ include "social-media-reuploader.fullname" . }}-secret{{ end }}
                  key: {{ default "BOT_TOKEN" .Values.secret.botTokenKey }}
{{- else if .Values.env.BOT_TOKEN }}
            - name: BOT_TOKEN
              value: {{ .Values.env.BOT_TOKEN | quote }}
{{- else }}
            # No BOT_TOKEN provided. Provide a Secret (recommended) or set `env.BOT_TOKEN` when installing the chart.
{{- end }}
            - name: MODE
              value: '{{ .Values.env.MODE | default "webhook" }}'
            - name: WEBHOOK_URL
              value: '{{ .Values.env.WEBHOOK_URL | default "" }}'
            - name: TMP_DIR
              value: '{{ .Values.env.TMP_DIR | default "/tmp/telegram_downloader" }}'
            - name: TELEGRAM_MAX_FILE_SIZE
              value: '{{ .Values.env.TELEGRAM_MAX_FILE_SIZE | default 52428800 }}'
            - name: WORKERS
              value: '{{ .Values.env.WORKERS | default "2" }}'
            - name: WORKER_SHUTDOWN_TIMEOUT
              value: '{{ .Values.terminationGracePeriodSeconds | default $profile.terminationGracePeriodSeconds | quote }}'
            {{- if .Values.db.pvc.enabled }}
            - name: REQUESTS_DB
              value: "{{ (default "/app/data" .Values.db.pvc.mountPath) }}/requests.db"
            {{- end }}
          {{- if .Values.db.pvc.enabled }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.db.pvc.mountPath | default "/app/data" }}
          {{- end }}
          securityContext:
            runAsUser: 1000
            runAsNonRoot: true
            allowPrivilegeEscalation: false
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 5
          {{- if .Values.resources }}
          resources: {{ toYaml .Values.resources | nindent 12 }}
          {{- else }}
          {{- if not (hasKey .Values.resourceProfiles .Values.resourceProfile) }}
          {{- fail (printf "unknown resourceProfile: %s" .Values.resourceProfile) }}
          {{- end }}
          {{- $profile := index .Values.resourceProfiles .Values.resourceProfile }}
          resources: {{ toYaml (dict "requests" $profile.requests "limits" $profile.limits) | nindent 12 }}
          {{- end }}
      {{- if .Values.db.pvc.enabled }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "social-media-reuploader.fullname" . }}-data
      {{- end }}
