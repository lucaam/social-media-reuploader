{{- $hasSecrets := or .Values.gui.secrets.adminToken .Values.gui.secrets.secretKey .Values.gui.secrets.oauthClientId .Values.gui.secrets.oauthClientSecret .Values.gui.secrets.oauthAuthorizeUrl .Values.gui.secrets.oauthTokenUrl .Values.gui.secrets.oauthUserinfoUrl .Values.gui.secrets.oauthJwksUri .Values.gui.secrets.oauthServerMetadataUrl -}}
{{- if and .Values.gui.enabled .Values.gui.useSecret (eq .Values.gui.secretName "") $hasSecrets -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "social-media-reuploader.fullname" . }}-gui-secret
type: Opaque
data:
  {{- if .Values.gui.secrets.adminToken }}
  ADMIN_TOKEN: {{ .Values.gui.secrets.adminToken | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.secretKey }}
  SECRET_KEY: {{ .Values.gui.secrets.secretKey | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthClientId }}
  OAUTH_CLIENT_ID: {{ .Values.gui.secrets.oauthClientId | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthClientSecret }}
  OAUTH_CLIENT_SECRET: {{ .Values.gui.secrets.oauthClientSecret | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthAuthorizeUrl }}
  OAUTH_AUTHORIZE_URL: {{ .Values.gui.secrets.oauthAuthorizeUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthTokenUrl }}
  OAUTH_TOKEN_URL: {{ .Values.gui.secrets.oauthTokenUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthUserinfoUrl }}
  OAUTH_USERINFO_URL: {{ .Values.gui.secrets.oauthUserinfoUrl | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthJwksUri }}
  OAUTH_JWKS_URI: {{ .Values.gui.secrets.oauthJwksUri | b64enc | quote }}
  {{- end }}
  {{- if .Values.gui.secrets.oauthServerMetadataUrl }}
  OAUTH_SERVER_METADATA_URL: {{ .Values.gui.secrets.oauthServerMetadataUrl | b64enc | quote }}
  {{- end }}
{{- else if and .Values.gui.enabled .Values.gui.useSecret (ne .Values.gui.secretName "") }}
# Custom secret name {{ .Values.gui.secretName }} assumed to exist (e.g., from SOPS)
{{- else if and .Values.gui.enabled .Values.gui.useSecret (eq .Values.gui.secretName "") (not $hasSecrets) }}
# gui.useSecret=true but no secrets provided; Secret will not be created. Ensure external Secret exists or provide secrets.
{{- end -}}
