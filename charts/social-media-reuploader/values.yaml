replicaCount: 1

# Optional overrides
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # If true, create a ServiceAccount for the deployment. If false, set `serviceAccount.name`
  create: true
  # Optional: provide an existing ServiceAccount name to use instead of creating one
  name: ""

image:
  repository: ghcr.io/lucaam/social-media-reuploader
  tag: "0.6.0"
  pullPolicy: IfNotPresent

# Optional imagePullSecrets for private registries
imagePullSecrets: []

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  hosts:
    - host: chart-example.local
      paths: ["/"]
  tls: []

# Resource profiles for different video workloads
# Choose: small, medium, large, or custom
resourceProfile: medium

# Predefined resource profiles
resourceProfiles:
  small:
    # For videos ≤50MB (light processing)
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 300m
      memory: 512Mi
    terminationGracePeriodSeconds: 60

  medium:
    # For videos ≤100MB (standard processing + recompress)
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
    terminationGracePeriodSeconds: 180

  large:
    # For videos ≤500MB (heavy processing, multiple compress attempts)
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 2Gi
    terminationGracePeriodSeconds: 300

# Override resourceProfile by setting resources directly
resources: null

# GUI Resources (separate from bot processing)
guiResources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
terminationGracePeriodSeconds: null

# Secret handling: create or reference an existing Secret for the bot token
secret:
  # If true, chart will create a Secret containing the bot token
  create: false
  # If set, use this existing Secret name instead of creating one
  name: ""
  # key name to store the bot token under (defaults to BOT_TOKEN)
  botTokenKey: BOT_TOKEN

env:
  # Do NOT place production secrets (BOT_TOKEN) directly in values.yaml.
  # Recommended: create a Kubernetes Secret and reference it via `secret.name`.
  # Example (manual):
  #   kubectl create secret generic <release>-secret --from-literal=BOT_TOKEN='<your-token>'
  # Or during helm install (not recommended to store token in values file):
  #   helm install my-release . --set secret.create=true --set env.BOT_TOKEN='<your-token>'

  # If you want to set a token via values for testing, use `env.BOT_TOKEN` when calling helm.
  # BOT_TOKEN: ""  # <- prefer using a Secret instead of setting this here

  MODE: webhook
  WEBHOOK_URL: ""
  TMP_DIR: /tmp/telegram_downloader
  TELEGRAM_MAX_FILE_SIZE: 52428800
  WORKERS: 2
  # If true, /health endpoints return diagnostic JSON (worker counts, DB status).
  # Keep false in production since kube probes call /health frequently.
  HEALTH_DEBUG: false

  # yt-dlp helper options (for sites requiring impersonation/cookies)
  # Set to a browser-like user-agent string when necessary.
  YTDLP_USER_AGENT: ""
  # Path inside the pod to a cookies.txt file (mount as Secret/volume)
  YTDLP_COOKIES_PATH: ""
  # Alternatively, use cookies-from-browser (e.g. chrome, firefox)
  YTDLP_COOKIES_FROM_BROWSER: ""
  # Additional headers to pass to yt-dlp. Use '|' to separate entries:
  # e.g. 'Referer: https://www.tiktok.com/|X-Requested-With: XMLHttpRequest'
  YTDLP_HEADERS: ""

  # Optional: comma-separated list of OAuth group names that should be
  # considered admins by the GUI (e.g. "authentik Admins,admins").
  # Can be set via values or injected through the GUI secret.
  OAUTH_ADMIN_GROUPS: ""

# GUI (FastAPI) settings
gui:
  enabled: true
  # by default use the same image as the main app; override to a separate image if needed
  image:
    repository: ghcr.io/lucaam/social-media-reuploader
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  port: 8081
  # Command to run in the GUI container. By default run the FastAPI app with uvicorn
  # This prevents the GUI pod from accidentally running the bot (default image CMD)
  command:
    - "uvicorn"
    - "src.gui:app"
    - "--host"
    - "0.0.0.0"
    - "--port"
    - "8081"
  # if true, create a Kubernetes Secret and mount it into the GUI pod
  useSecret: false
  # custom secret name (optional). If empty, chart will use "<fullname>-gui-secret"
  secretName: ""
  # GUI secret values (only used if useSecret=true)
  secrets:
    adminToken: ""
    secretKey: ""
    oauthClientId: ""
    oauthClientSecret: ""
    oauthAuthorizeUrl: ""
    oauthTokenUrl: ""
    oauthUserinfoUrl: ""
    oauthJwksUri: ""
    oauthServerMetadataUrl: ""
    # Comma-separated group names that should be treated as admin
    oauthAdminGroups: ""

# Database / persistence for GUI
db:
  pvc:
    enabled: false
    storageClass: ""
    size: 1Gi
    mountPath: /app/data

# Gateway API (HTTPRoute) support
gatewayApi:
  enabled: false
  gatewayName: ""
  hosts: []
  # path and service port to route to
  path: "/"
  servicePort: 80
