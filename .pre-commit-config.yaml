repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        exclude: ^charts/
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        language_version: python3.12

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.10.1
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: env PYTHONPATH=. pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]

  - repo: local
    hooks:
      - id: helm-lint
        name: helm lint (charts)
        entry: helm lint charts/social-media-reuploader
        language: system
        pass_filenames: false


  - repo: local
    hooks:
      - id: commitlint
        name: commitlint (Conventional Commits)
        entry: scripts/commit-msg-fix.sh
        language: script
        pass_filenames: true
        stages: [commit-msg]
      - id: commitlint-pre-push
        name: commitlint (pre-push)
        entry: scripts/commitlint-pre-push.sh
        language: script
        pass_filenames: false
        stages: [pre-push]

      - id: actionlint
        name: actionlint (GitHub Actions linter)
        entry: actionlint
        language: system
        pass_filenames: true
        files: '^\\.github/workflows/.*\\.(ya?ml|yaml)$'
