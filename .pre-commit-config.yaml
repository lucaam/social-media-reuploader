repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff
        entry: ruff check .
        language: system
        pass_filenames: false
      - id: black-check
        name: black
        entry: black --check .
        language: system
        pass_filenames: false
      - id: isort-check
        name: isort
        entry: isort --check-only .
        language: system
        pass_filenames: false
      - id: pytest-push
        name: pytest (pre-push)
        entry: pytest -q
        language: system
        pass_filenames: false
        stages: [push]
