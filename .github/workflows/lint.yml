name: Lint and Static Checks

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint:
    name: Linters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt
      - name: Ruff (static analysis)
        run: |
          ruff check .
      - name: Black check (format)
        run: |
          black --check .
      - name: isort check (imports)
        run: |
          isort --check-only .
      - name: Pre-commit hooks (all)
        run: |
          pre-commit run --all-files
      - name: actionlint (GitHub Actions YAML linter)
        run: |
          curl -sSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s -- -b /tmp
          /tmp/actionlint .github/workflows || exit 1
