name: Build and publish Docker image to GHCR on release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

vars:
  DOCKER_RELEASE_ALLOWED_AUTHOR: ${{ secrets.DOCKER_RELEASE_ALLOWED_AUTHOR }}

jobs:
  build:
    # Run when the release author is the repository owner, an explicitly
    # allowed author (via `DOCKER_RELEASE_ALLOWED_AUTHOR`), or the
    # GitHub Actions bot (so automated releases from release-please still
    # trigger the docker build).
    if: ${{ github.event.release.author.login == (vars.DOCKER_RELEASE_ALLOWED_AUTHOR || github.repository_owner) || github.event.release.author.login == 'github-actions' || github.event.release.author.login == 'github-actions[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug release author
        run: |
          echo "Release author: ${GITHUB_EVENT_RELEASE_AUTHOR_LOGIN:-${{ github.event.release.author.login }}}"
          echo "Actor: ${{ github.actor }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.release.published_at }}
            VERSION=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.release.published_at }}
