name: Build and publish Docker image to GHCR on release

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write

# Optional: a repository secret can list an allowed alternate author
# DOCKER_RELEASE_ALLOWED_AUTHOR is read inside the step-level check below.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check release author is allowed
        run: |
          ACTOR="${{ github.event.release.author.login }}"
          if [ "$ACTOR" = "${{ github.repository_owner }}" ] || [ "$ACTOR" = "github-actions" ] || [ "$ACTOR" = "github-actions[bot]" ] || [ "$ACTOR" = "${{ secrets.DOCKER_RELEASE_ALLOWED_AUTHOR }}" ]; then
            echo "Allowed author: $ACTOR"
          else
            echo "Release author $ACTOR not allowed, skipping build."
            exit 0
          fi

      - name: Debug release author
        run: |
          echo "Release author: ${GITHUB_EVENT_RELEASE_AUTHOR_LOGIN:-${{ github.event.release.author.login }}}"
          echo "Actor: ${{ github.actor }}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:latest
          build-args: |
            VCS_REF=${{ github.sha }}
            BUILD_DATE=${{ github.event.release.published_at }}
            VERSION=${{ github.event.release.tag_name }}
          labels: |
            org.opencontainers.image.version=${{ github.event.release.tag_name }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.created=${{ github.event.release.published_at }}

      - name: Make GHCR package public (requires GHCR_PAT)
        if: ${{ secrets.GHCR_PAT }}
        env:
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          package_name="$REPO"
          package_type="container"
          echo "Repository: $GITHUB_REPOSITORY, package: $package_name, owner: $OWNER"

          # Try org endpoint first
          resp=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GHCR_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/orgs/${OWNER}/packages/${package_type}/${package_name}/visibility" \
            -d '{"visibility":"public"}' || true)

          if [ "$resp" = "200" ] || [ "$resp" = "201" ] || [ "$resp" = "204" ]; then
            echo "GHCR package visibility set to public (org endpoint)."
            exit 0
          fi

          echo "Org endpoint returned $resp; trying user endpoint..."

          resp2=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $GHCR_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/user/packages/${package_type}/${package_name}/visibility" \
            -d '{"visibility":"public"}' || true)

          if [ "$resp2" = "200" ] || [ "$resp2" = "201" ] || [ "$resp2" = "204" ]; then
            echo "GHCR package visibility set to public (user endpoint)."
            exit 0
          fi

          echo "Failed to set GHCR package visibility: org=$resp user=$resp2"
          echo "This operation usually requires a personal access token (GHCR_PAT) with package write/admin privileges for the package owner.\nAdd a secret named 'GHCR_PAT' and re-run the workflow to enable automatic visibility changes."

      - name: Make GHCR package public (skipped)
        if: ${{ !secrets.GHCR_PAT }}
        run: |
          echo "No GHCR_PAT secret found — skipping automatic visibility change."
          echo "To enable automatic publishing of GHCR packages as public, create a personal access token with 'write:packages' (and org admin rights if needed) and add it as the repository secret 'GHCR_PAT'."
