name: Helm Lint & Template

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v1
        with:
          version: '3.10.0'
      - name: Helm lint
        run: helm lint charts/social-media-reuploader
      - name: Helm template
        run: helm template my-release charts/social-media-reuploader
      - name: Install helm-unittest plugin
        run: |
          helm plugin install https://github.com/quintush/helm-unittest || true
      - name: Run helm unittest (if any)
        run: |
          helm plugin list || true
          helm unittest charts/social-media-reuploader || true
