name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create release PR / Release (release-please)
        id: release-please
        # NOTE: `release-please` can be configured to publish releases automatically.
        # If you prefer to only create a release PR and publish releases manually
        # (so downstream workflows like docker-release only run for your manual
        # publishes), configure the action to *not* auto-publish. Consult the
        # google-github-actions/release-please-action docs for the correct input
        # (for example: `skip-github-release: true`) and adjust the inputs below.
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: 'python'
          # Create a release PR instead of publishing releases automatically.
          # This ensures version/chart changes are reviewed and merged manually
          # and downstream jobs (e.g. docker-release) run only on actual
          # published releases.
          skip-github-release: true

      # Version and chart updates are no longer pushed automatically here.
      # With `skip-github-release: true` release-please will create a release
      # PR that maintainers can review and merge; include any version/chart
      # changes inside that PR instead of pushing to `main` from this workflow.

      # Docker image build/push is handled in .github/workflows/docker-release.yml
      # which runs on `release.published` events. Remove build/push from
      # release-please to keep separation of concerns and avoid long-running
      # steps during release metadata creation.
