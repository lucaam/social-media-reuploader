name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Create release PR / Release (release-please)
        id: release-please
        # NOTE: `release-please` can be configured to publish releases automatically.
        # If you prefer to only create a release PR and publish releases manually
        # (so downstream workflows like docker-release only run for your manual
        # publishes), configure the action to *not* auto-publish. Consult the
        # google-github-actions/release-please-action docs for the correct input
        # (for example: `skip-github-release: true`) and adjust the inputs below.
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: 'python'
          # Ensure we do not skip creating GitHub releases (publish automatically)
          skip-github-release: false

      - name: Fetch tags and set VERSION
        run: |
          git fetch --tags --prune
          VERSION=$(git tag --sort=-v:refname | head -n1)
          echo "Found tag: $VERSION"
          # Strip leading 'v' or 'V' from tag for image and app versions
          VERSION=${VERSION#v}
          VERSION=${VERSION#V}
          echo "Using cleaned version: $VERSION"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Update package version in src/__init__.py
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          if [ -z "${VERSION}" ]; then
            echo "VERSION is empty; skipping package version update"
            exit 0
          fi
          echo "Updating src/__init__.py to ${VERSION}"
          python3 scripts/set_version.py --version "${VERSION}" --commit --branch main

      - name: Update Chart appVersion
        if: ${{ steps.release-please.outputs.release_created == 'true' }}
        run: |
          if [ -z "${VERSION}" ]; then
            echo "VERSION is empty; skipping Chart update"
            exit 0
          fi
          echo "Updating charts/social-media-reuploader/Chart.yaml appVersion to ${VERSION}"
          if [ -f charts/social-media-reuploader/Chart.yaml ]; then
            sed -i -E "s/^appVersion: .*/appVersion: \"${VERSION}\"/" charts/social-media-reuploader/Chart.yaml
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add charts/social-media-reuploader/Chart.yaml
            git commit -m "chore(chart): set appVersion ${VERSION} [skip ci]" || echo "No change to Chart.yaml"
            git push origin main || echo "Push failed; possibly running in detached head"
          else
            echo "Chart.yaml not found; skipping"
          fi

      # Docker image build/push is handled in .github/workflows/docker-release.yml
      # which runs on `release.published` events. Remove build/push from
      # release-please to keep separation of concerns and avoid long-running
      # steps during release metadata creation.
