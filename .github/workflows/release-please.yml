name: Release Please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  pages: write
  id-token: write
  packages: write

jobs:
  release:
    name: release-please
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release PR / Release (release-please)
        # NOTE: `release-please` can be configured to publish releases automatically.
        # If you prefer to only create a release PR and publish releases manually
        # (so downstream workflows like docker-release only run for your manual
        # publishes), configure the action to *not* auto-publish. Consult the
        # google-github-actions/release-please-action docs for the correct input
        # (for example: `skip-github-release: true`) and adjust the inputs below.
        uses: googleapis/release-please-action@v5.0.0
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          release-type: 'python'
          # Ensure we do not skip creating GitHub releases (publish automatically)
          skip-github-release: false

      - name: Fetch tags and set VERSION
        run: |
          git fetch --tags --prune
          VERSION=$(git tag --sort=-v:refname | head -n1)
          echo "Found tag: $VERSION"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ env.VERSION }}
